<svg width="1200" height="520" viewBox="0 0 1200 520" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="50%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#39ff14"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      .bg { fill:#050816; }
      .frame { fill:rgba(15,23,42,.78); stroke:url(#grad); stroke-width:2; }
      .title {
        font-family:Arial,sans-serif; font-size:40px; font-weight:900;
        letter-spacing:6px; fill:url(#grad); filter:url(#glow);
      }
      .small { font-family:monospace; font-size:15px; fill:#94a3b8; }
      .addr { font-family:monospace; font-size:16px; fill:#e2e8f0; }
      .balance { font-family:monospace; font-size:20px; font-weight:800; fill:#22d3ee; filter:url(#glow); }
      .amount { font-family:monospace; font-size:22px; font-weight:900; fill:#39ff14; filter:url(#glow); }
      .negative { fill:#fb7185; }
      .txid { font-family:monospace; font-size:14px; fill:#22d3ee; }
      .box { fill:rgba(15,23,42,.95); stroke:#22d3ee; stroke-width:1.5; filter:url(#glow); }
      .sendbox { stroke:#a855f7; }
      .recvbox { stroke:#39ff14; }
      .line {
        stroke:url(#grad); stroke-width:4; stroke-linecap:round; filter:url(#glow);
        stroke-dasharray:20 14; animation: flow 1.1s linear infinite;
      }
      .coin { fill:#39ff14; filter:url(#glow); opacity:0; }
      .coinText { font-family:Arial,sans-serif; font-size:15px; font-weight:900; fill:#050816; opacity:0; }
      .check { fill:#39ff14; filter:url(#glow); opacity:0; }
      .phase { opacity:0; }
      .balanceOld { opacity:1; }
      .balanceNew { opacity:0; fill:#39ff14; }
      .balanceDown { opacity:0; fill:#fb7185; }

      @keyframes flow { from { stroke-dashoffset:0; } to { stroke-dashoffset:-68; } }

      .tx1 { animation: tx1 16s linear infinite; }
      .tx2 { animation: tx2 16s linear infinite; }
      .tx3 { animation: tx3 16s linear infinite; }
      .tx4 { animation: tx4 16s linear infinite; }

      @keyframes tx1 { 0%,24%{opacity:1} 25%,100%{opacity:0} }
      @keyframes tx2 { 0%,24%{opacity:0} 25%,49%{opacity:1} 50%,100%{opacity:0} }
      @keyframes tx3 { 0%,49%{opacity:0} 50%,74%{opacity:1} 75%,100%{opacity:0} }
      @keyframes tx4 { 0%,74%{opacity:0} 75%,100%{opacity:1} }

      .coin1 { animation: move1 16s linear infinite; }
      .coin2 { animation: move2 16s linear infinite; }
      .coin3 { animation: move3 16s linear infinite; }
      .coin4 { animation: move4 16s linear infinite; }

      @keyframes move1 {
        0%,4%{opacity:0; transform:translate(0,0)}
        6%,18%{opacity:1}
        22%,100%{opacity:0; transform:translate(690px,0)}
      }
      @keyframes move2 {
        0%,29%{opacity:0; transform:translate(690px,-95px)}
        31%,43%{opacity:1}
        48%,100%{opacity:0; transform:translate(0,95px)}
      }
      @keyframes move3 {
        0%,54%{opacity:0; transform:translate(0,190px)}
        56%,68%{opacity:1}
        73%,100%{opacity:0; transform:translate(690px,-190px)}
      }
      @keyframes move4 {
        0%,79%{opacity:0; transform:translate(690px,95px)}
        81%,93%{opacity:1}
        99%,100%{opacity:0; transform:translate(0,-95px)}
      }

      .showCheck1 { animation: check1 16s linear infinite; }
      .showCheck2 { animation: check2 16s linear infinite; }
      .showCheck3 { animation: check3 16s linear infinite; }
      .showCheck4 { animation: check4 16s linear infinite; }

      @keyframes check1 { 0%,18%{opacity:0} 20%,24%{opacity:1} 25%,100%{opacity:0} }
      @keyframes check2 { 0%,43%{opacity:0} 45%,49%{opacity:1} 50%,100%{opacity:0} }
      @keyframes check3 { 0%,68%{opacity:0} 70%,74%{opacity:1} 75%,100%{opacity:0} }
      @keyframes check4 { 0%,93%{opacity:0} 95%,100%{opacity:1} }

      .old1 { animation: old1 16s linear infinite; }
      .new1 { animation: new1 16s linear infinite; }
      .down1 { animation: down1 16s linear infinite; }

      @keyframes old1 { 0%,18%{opacity:1} 20%,24%{opacity:0} 25%,100%{opacity:1} }
      @keyframes down1 { 0%,18%{opacity:0} 20%,24%{opacity:1} 25%,100%{opacity:0} }
      @keyframes new1 { 0%,18%{opacity:0} 20%,24%{opacity:1} 25%,100%{opacity:0} }
    </style>
  </defs>

  <rect class="bg" width="1200" height="520" rx="26"/>
  <rect class="frame" x="18" y="18" width="1164" height="484" rx="24"/>

  <text x="600" y="65" text-anchor="middle" class="title">PQC LIVE TRANSACTIONS</text>
  <text x="600" y="96" text-anchor="middle" class="small">Animated send • receive • deposit • txid • balance update</text>

  <rect x="60" y="135" width="340" height="95" rx="18" class="box sendbox"/>
  <text x="85" y="165" class="small">WALLET A</text>
  <text x="85" y="192" class="addr">pqc_7f8a3c91...b42e19d0</text>
  <text x="85" y="218" class="balance">Balance: 5,420.75 PQC</text>

  <rect x="800" y="135" width="340" height="95" rx="18" class="box recvbox"/>
  <text x="825" y="165" class="small">WALLET B</text>
  <text x="825" y="192" class="addr">pqc_a92d6e40...91c77f21</text>
  <text x="825" y="218" class="balance">Balance: 780.20 PQC</text>

  <rect x="60" y="270" width="340" height="95" rx="18" class="box recvbox"/>
  <text x="85" y="300" class="small">WALLET C</text>
  <text x="85" y="327" class="addr">pqc_44db8a11...8f029ac3</text>
  <text x="85" y="353" class="balance">Balance: 12,045.00 PQC</text>

  <rect x="800" y="270" width="340" height="95" rx="18" class="box sendbox"/>
  <text x="825" y="300" class="small">WALLET D</text>
  <text x="825" y="327" class="addr">pqc_e19a6f77...3c90dd51</text>
  <text x="825" y="353" class="balance">Balance: 2,315.88 PQC</text>

  <line x1="425" y1="182" x2="775" y2="182" class="line tx1"/>
  <line x1="775" y1="182" x2="425" y2="317" class="line tx2"/>
  <line x1="425" y1="317" x2="775" y2="182" class="line tx3"/>
  <line x1="775" y1="317" x2="425" y2="182" class="line tx4"/>

  <g transform="translate(425 182)">
    <circle r="28" class="coin coin1"/>
    <text y="5" text-anchor="middle" class="coinText coin1">125</text>
  </g>
  <g transform="translate(425 182)">
    <circle r="28" class="coin coin2"/>
    <text y="5" text-anchor="middle" class="coinText coin2">48</text>
  </g>
  <g transform="translate(425 182)">
    <circle r="28" class="coin coin3"/>
    <text y="5" text-anchor="middle" class="coinText coin3">920</text>
  </g>
  <g transform="translate(425 182)">
    <circle r="28" class="coin coin4"/>
    <text y="5" text-anchor="middle" class="coinText coin4">310</text>
  </g>

  <g transform="translate(970 242)" class="check showCheck1">
    <circle r="21"/>
    <path d="M-9 0 L-2 8 L12 -8" stroke="#050816" stroke-width="5" fill="none" stroke-linecap="round"/>
  </g>
  <g transform="translate(230 377)" class="check showCheck2">
    <circle r="21"/>
    <path d="M-9 0 L-2 8 L12 -8" stroke="#050816" stroke-width="5" fill="none" stroke-linecap="round"/>
  </g>
  <g transform="translate(970 242)" class="check showCheck3">
    <circle r="21"/>
    <path d="M-9 0 L-2 8 L12 -8" stroke="#050816" stroke-width="5" fill="none" stroke-linecap="round"/>
  </g>
  <g transform="translate(230 242)" class="check showCheck4">
    <circle r="21"/>
    <path d="M-9 0 L-2 8 L12 -8" stroke="#050816" stroke-width="5" fill="none" stroke-linecap="round"/>
  </g>

  <g class="tx1">
    <text x="600" y="130" text-anchor="middle" class="amount">A sends 125.50 PQC → B receives deposit</text>
    <text x="600" y="410" text-anchor="middle" class="txid">TXID: 8f3c2a91d7e4b6c0aa49f21e9d3c8b50f6a7e14c91b2d0f8a61c93e7d44ab921</text>
    <text x="230" y="252" text-anchor="middle" class="amount negative">A: 5,420.75 → 5,295.25</text>
    <text x="970" y="252" text-anchor="middle" class="amount">B: 780.20 → 905.70</text>
  </g>

  <g class="tx2">
    <text x="600" y="130" text-anchor="middle" class="amount">B sends 48.90 PQC → C receives deposit</text>
    <text x="600" y="410" text-anchor="middle" class="txid">TXID: c71d90ef4a22bb8910c65e7f2d51a84aa3b9800d91f67e1d45ca9e03f8712b0c</text>
    <text x="970" y="252" text-anchor="middle" class="amount negative">B: 905.70 → 856.80</text>
    <text x="230" y="387" text-anchor="middle" class="amount">C: 12,045.00 → 12,093.90</text>
  </g>

  <g class="tx3">
    <text x="600" y="130" text-anchor="middle" class="amount">C sends 920.00 PQC → B receives deposit</text>
    <text x="600" y="410" text-anchor="middle" class="txid">TXID: a19e64d2ff83b0c21e9f764a5c78113dd2ae91f672004ac9b7712f00ea31c845</text>
    <text x="230" y="387" text-anchor="middle" class="amount negative">C: 12,093.90 → 11,173.90</text>
    <text x="970" y="252" text-anchor="middle" class="amount">B: 856.80 → 1,776.80</text>
  </g>

  <g class="tx4">
    <text x="600" y="130" text-anchor="middle" class="amount">D sends 310.25 PQC → A receives deposit</text>
    <text x="600" y="410" text-anchor="middle" class="txid">TXID: 5b20cf9a7e4a0139dc66b34b827e819a6f039c7d2ce11a448d5a7f90ee02b7cd</text>
    <text x="970" y="387" text-anchor="middle" class="amount negative">D: 2,315.88 → 2,005.63</text>
    <text x="230" y="252" text-anchor="middle" class="amount">A: 5,295.25 → 5,605.50</text>
  </g>
</svg>
