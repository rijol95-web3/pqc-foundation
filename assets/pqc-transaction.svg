<svg width="1200" height="420" viewBox="0 0 1200 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="50%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#39ff14"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      .bg { fill:#050816; }
      .frame {
        fill:rgba(15,23,42,.75);
        stroke:url(#grad);
        stroke-width:2;
      }
      .title {
        font-family:Arial, sans-serif;
        font-size:42px;
        font-weight:900;
        letter-spacing:6px;
        fill:url(#grad);
        filter:url(#glow);
      }
      .label {
        font-family:monospace;
        font-size:18px;
        fill:#94a3b8;
      }
      .addr {
        font-family:monospace;
        font-size:17px;
        fill:#e2e8f0;
      }
      .amount {
        font-family:monospace;
        font-size:28px;
        font-weight:800;
        fill:#39ff14;
        filter:url(#glow);
      }
      .txid {
        font-family:monospace;
        font-size:16px;
        fill:#22d3ee;
      }
      .box {
        fill:rgba(15,23,42,.95);
        stroke:#22d3ee;
        stroke-width:1.5;
        filter:url(#glow);
      }
      .receiver {
        stroke:#39ff14;
      }
      .sender {
        stroke:#a855f7;
      }
      .line {
        stroke:url(#grad);
        stroke-width:5;
        stroke-linecap:round;
        filter:url(#glow);
        stroke-dasharray:20 18;
        animation: flow 1.2s linear infinite;
      }
      .coin {
        fill:#39ff14;
        filter:url(#glow);
        animation: moveCoin 4s ease-in-out infinite;
      }
      .coinText {
        font-family:Arial, sans-serif;
        font-size:20px;
        font-weight:900;
        fill:#050816;
        animation: moveCoin 4s ease-in-out infinite;
      }
      .statusPending {
        font-family:monospace;
        font-size:18px;
        fill:#facc15;
        animation: pending 4s linear infinite;
      }
      .statusConfirmed {
        font-family:monospace;
        font-size:18px;
        fill:#39ff14;
        filter:url(#glow);
        animation: confirmed 4s linear infinite;
      }
      .check {
        fill:#39ff14;
        filter:url(#glow);
        opacity:0;
        animation: showCheck 4s linear infinite;
      }

      @keyframes flow {
        from { stroke-dashoffset:0; }
        to { stroke-dashoffset:-76; }
      }

      @keyframes moveCoin {
        0% { transform:translate(0px,0px); opacity:0; }
        12% { opacity:1; }
        50% { transform:translate(350px,0px); opacity:1; }
        78% { transform:translate(700px,0px); opacity:1; }
        100% { transform:translate(700px,0px); opacity:0; }
      }

      @keyframes pending {
        0%,55% { opacity:1; }
        65%,100% { opacity:0; }
      }

      @keyframes confirmed {
        0%,60% { opacity:0; }
        72%,100% { opacity:1; }
      }

      @keyframes showCheck {
        0%,63% { opacity:0; transform:scale(.8); }
        75%,100% { opacity:1; transform:scale(1); }
      }
    </style>
  </defs>

  <rect class="bg" width="1200" height="420" rx="26"/>
  <rect class="frame" x="20" y="20" width="1160" height="380" rx="24"/>

  <text x="600" y="72" text-anchor="middle" class="title">PQC TRANSACTION</text>
  <text x="600" y="105" text-anchor="middle" class="label">POST-QUANTUM VALUE TRANSFER</text>

  <!-- Sender -->
  <rect x="65" y="145" width="330" height="170" rx="20" class="box sender"/>
  <text x="230" y="183" text-anchor="middle" class="label">SENDER ADDRESS</text>
  <text x="230" y="224" text-anchor="middle" class="addr">pqc_7f8a3c91...b42e19d0</text>
  <text x="230" y="270" text-anchor="middle" class="amount">- 125.50 PQC</text>

  <!-- Receiver -->
  <rect x="805" y="145" width="330" height="170" rx="20" class="box receiver"/>
  <text x="970" y="183" text-anchor="middle" class="label">RECEIVER ADDRESS</text>
  <text x="970" y="224" text-anchor="middle" class="addr">pqc_a92d6e40...91c77f21</text>
  <text x="970" y="270" text-anchor="middle" class="amount">+ 125.50 PQC</text>

  <!-- Transfer line -->
  <line x1="420" y1="230" x2="780" y2="230" class="line"/>

  <!-- Moving coin -->
  <g transform="translate(420 230)">
    <circle cx="0" cy="0" r="31" class="coin"/>
    <text x="0" y="7" text-anchor="middle" class="coinText">PQC</text>
  </g>

  <!-- Confirmation check -->
  <g transform="translate(1048 286)" class="check">
    <circle cx="0" cy="0" r="22"/>
    <path d="M-10 0 L-2 9 L13 -9" stroke="#050816" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- TX details -->
  <rect x="230" y="335" width="740" height="44" rx="14" fill="rgba(2,6,23,.9)" stroke="#22d3ee"/>
  <text x="600" y="363" text-anchor="middle" class="txid">
    TXID: 8f3c2a91d7e4b6c0aa49f21e9d3c8b50f6a7e14c91b2d0f8a61c93e7d44ab921
  </text>

  <text x="600" y="132" text-anchor="middle" class="statusPending">STATUS: BROADCASTING TRANSACTION...</text>
  <text x="600" y="132" text-anchor="middle" class="statusConfirmed">STATUS: CONFIRMED ✅ RECEIVER ACCEPTED</text>
</svg>
